; ============================================================
;  Horloge Familiale ESP32 + HUB75 64x32
;  PlatformIO configuration
; ============================================================

[env:esp32dev]
platform    = espressif32
board       = esp32dev
framework   = arduino

; ----- Flash & partition -----
board_build.partitions = partitions_custom.csv
board_upload.flash_size = 4MB

; ----- Monitor -----
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ----- Build flags -----
build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; --- HUB75 panel geometry ---
    -DPANEL_WIDTH=64
    -DPANEL_HEIGHT=32
    -DCHAIN_LENGTH=1
    ; --- Features ---
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DASYNC_TCP_SSL_ENABLED=0
    -DCONFIG_ASYNC_TCP_STACK_SIZE=16384

; ----- Dependencies -----
lib_deps =
    ; Adafruit GFX (requis par HUB75)
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1
    ; Affichage HUB75
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.10
    ; Serveur web asynchrone
    mathieucarbou/ESPAsyncWebServer @ ^3.3.10
    mathieucarbou/AsyncTCP @ ^3.3.2
    ; JSON
    bblanchon/ArduinoJson @ ^7.2.0
    ; NTP
    arduino-libraries/NTPClient @ ^3.2.1
    ; mDNS intégré à l'ESP-IDF, pas besoin de lib externe
    ; Portail captif WiFi
    tzapu/WiFiManager @ ^2.0.17

; ----- Filesystem (SPIFFS pour les fichiers web) -----
board_build.filesystem = spiffs
